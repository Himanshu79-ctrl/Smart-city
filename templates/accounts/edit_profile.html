{% extends "base.html" %}
{% block content %}

<section class="max-w-2xl mx-auto px-6 pt-24 pb-16">

    <div class="rounded-3xl p-8 bg-white/5 border border-white/10 backdrop-blur-xl shadow-2xl">

        <h2 class="text-2xl font-bold text-white mb-8">
            Edit Profile
        </h2>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">

            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block mb-2 text-gray-300 font-medium">Name</label>

                <input type="text" name="username" value="{{ user.username }}"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/20 text-white">
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-2 text-gray-300 font-medium">Email</label>

                <input type="email" name="email" value="{{ user.email }}"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/20 text-white">
            </div>

            <!-- Phone -->
            <div>
                <label class="block mb-2 text-gray-300 font-medium">Phone</label>

                <input type="text" name="phone" value="{{ user.phone }}"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/20 text-white">
            </div>

            <!-- Current Profile Picture -->

            <div>

                <label class="block mb-2 text-gray-300 font-medium">
                    Current Profile Picture
                </label>

                {% if user.profile_pic %}

                <img src="{{ user.profile_pic.url }}"
                    class="w-24 h-24 rounded-full object-cover border border-white/20">

                {% else %}

                <p class="text-gray-400 text-sm">
                    No profile picture
                </p>

                {% endif %}

            </div>


            <!-- Upload New Picture -->

            <div>

                <label class="block mb-2 text-gray-300 font-medium">
                    Change Profile Picture
                </label>

                <input type="file" name="profile_pic" accept="image/*" class="text-white">

            </div>


            <!-- Buttons -->

            <div class="flex justify-between pt-4">

                <a href="{% url 'profile' %}" class="px-6 py-3 rounded-xl bg-gray-600 text-white">
                    Cancel
                </a>

                <button class="px-6 py-3 rounded-xl bg-indigo-600 text-white">
                    Update Profile
                </button>

            </div>

        </form>

    </div>

</section>

{% endblock %}
