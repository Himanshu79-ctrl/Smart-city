{% extends 'base.html' %}
{% block title %}Password Reset Complete - SmartCity{% endblock %}

{% block content %}

<!-- ================= COMPLETE ================= -->
<section class="relative min-h-[80vh] flex items-center justify-center px-6 overflow-hidden">

    <!-- Glow Orbs -->
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-500 rounded-full blur-3xl opacity-20"></div>
    <div class="absolute top-20 -right-40 w-96 h-96 bg-pink-500 rounded-full blur-3xl opacity-20"></div>

    <!-- Pulse Rings -->
    <div class="absolute w-96 h-96 border border-indigo-500 rounded-full animate-ping opacity-10"></div>
    <div class="absolute w-[600px] h-[600px] border border-purple-500 rounded-full animate-pulse opacity-10"></div>

    <div class="relative z-10 w-full max-w-md">

        <div class="bg-white/5 backdrop-blur-xl p-8 rounded-3xl border border-white/10 
                    transition-all duration-300 hover:border-green-400/40 hover:shadow-2xl text-center">

            <!-- Success Icon -->
            <div class="text-6xl mb-6">✅</div>

            <!-- Header -->
            <h2 class="text-4xl font-bold mb-3">
                <span class="bg-gradient-to-r from-green-400 to-teal-400 bg-clip-text text-transparent">
                    Password Changed!
                </span>
            </h2>

            <!-- Message -->
            <p class="text-gray-300 mt-4">
                Your password has been set successfully.
            </p>

            <!-- Login Button -->
            <div class="mt-8">
                <a href="{% url 'login' %}" 
                   class="inline-block w-full py-4 rounded-2xl
                          bg-gradient-to-r from-indigo-600 to-purple-600
                          hover:from-indigo-500 hover:to-purple-500
                          text-white font-semibold text-lg
                          transition transform hover:scale-[1.02] shadow-lg">
                    Login Now
                </a>
            </div>

            <!-- Back to Home -->
            <div class="mt-4">
                <a href="{% url 'home' %}" class="text-sm text-gray-400 hover:text-indigo-400 transition">
                    ← Return to Home
                </a>
            </div>

        </div>
    </div>
</section>

{% endblock %}
